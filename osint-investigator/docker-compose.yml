version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./osint.db
      - DATA_DIR=/app/data
      - CORS_ORIGINS=["http://localhost:5173","http://frontend:5173"]
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_data:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite+aiosqlite:///./osint.db
      - DATA_DIR=/app/data
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - backend_data:/app
    command: celery -A app.workers.celery_app worker --loglevel=info -Q investigations -c 4

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  redis_data:
  backend_data:
